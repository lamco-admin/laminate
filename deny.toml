[graph]
all-features = true

[advisories]
ignore = [
    "RUSTSEC-2023-0071", # rsa crate Marvin Attack — transitive via sqlx, no fix available
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
